<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#fd783b"/>
  <!-- abdomen - striped -->
  <ellipse cx="36" cy="40" rx="8" ry="11" fill="#fff"/>
  <line x1="28" y1="36" x2="44" y2="36" stroke="#fd783b" stroke-width="2"/>
  <line x1="28" y1="40" x2="44" y2="40" stroke="#fd783b" stroke-width="2"/>
  <line x1="29" y1="44" x2="43" y2="44" stroke="#fd783b" stroke-width="2"/>
  <!-- waist/petiole -->
  <rect x="30" y="27" width="4" height="6" rx="2" fill="#fff"/>
  <!-- thorax -->
  <ellipse cx="28" cy="24" rx="6" ry="5" fill="#fff"/>
  <!-- head -->
  <circle cx="20" cy="19" r="5" fill="#fff"/>
  <!-- wings -->
  <ellipse cx="36" cy="20" rx="10" ry="4" fill="#fff" opacity="0.8" transform="rotate(-20 36 20)"/>
  <ellipse cx="36" cy="25" rx="8" ry="3" fill="#fff" opacity="0.6" transform="rotate(-15 36 25)"/>
  <!-- stinger -->
  <line x1="36" y1="50" x2="36" y2="55" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- antennae -->
  <line x1="18" y1="15" x2="14" y2="9" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="15" x2="24" y2="9" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
