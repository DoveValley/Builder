<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64" role="img" aria-label="Recovery Dawn">
  <defs>
    <linearGradient id="rd-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a6fa0"/>
      <stop offset="1" stop-color="#0e2a45"/>
    </linearGradient>
    <linearGradient id="rd-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd888"/>
      <stop offset="1" stop-color="#e8933f"/>
    </linearGradient>
    <clipPath id="rd-badge"><circle cx="32" cy="32" r="31"/></clipPath>
  </defs>
  <!-- rising-sun badge -->
  <circle cx="32" cy="32" r="31" fill="url(#rd-sky)"/>
  <g clip-path="url(#rd-badge)">
    <!-- rays -->
    <g stroke="#ffd888" stroke-width="2.4" stroke-linecap="round">
      <line x1="32" y1="10" x2="32" y2="19"/>
      <line x1="18" y1="14" x2="23" y2="22"/>
      <line x1="46" y1="14" x2="41" y2="22"/>
      <line x1="9" y1="25" x2="18" y2="29"/>
      <line x1="55" y1="25" x2="46" y2="29"/>
    </g>
    <!-- sun rising over the horizon -->
    <circle cx="32" cy="41" r="13" fill="url(#rd-sun)"/>
    <rect x="0" y="41" width="64" height="23" fill="#0b2138"/>
    <line x1="0" y1="41" x2="64" y2="41" stroke="#ffd888" stroke-width="1.8" opacity="0.85"/>
  </g>
  <!-- wordmark -->
  <text x="76" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">
    <tspan fill="#0e2a45">Recovery</tspan><tspan fill="#e8933f"> Dawn</tspan>
  </text>
</svg>
