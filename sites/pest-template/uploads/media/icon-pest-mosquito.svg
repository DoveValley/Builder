<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#fd783b"/>
  <!-- body -->
  <ellipse cx="32" cy="36" rx="4" ry="10" fill="#fff"/>
  <!-- head -->
  <circle cx="32" cy="24" r="4" fill="#fff"/>
  <!-- proboscis -->
  <line x1="32" y1="28" x2="32" y2="46" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- wings left -->
  <ellipse cx="22" cy="30" rx="9" ry="4" fill="#fff" opacity="0.8" transform="rotate(-15 22 30)"/>
  <!-- wings right -->
  <ellipse cx="42" cy="30" rx="9" ry="4" fill="#fff" opacity="0.8" transform="rotate(15 42 30)"/>
  <!-- antennae -->
  <line x1="30" y1="21" x2="24" y2="15" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="21" x2="40" y2="15" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- legs -->
  <line x1="28" y1="35" x2="18" y2="40" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="28" y1="38" x2="17" y2="45" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="36" y1="35" x2="46" y2="40" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="36" y1="38" x2="47" y2="45" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
</svg>
