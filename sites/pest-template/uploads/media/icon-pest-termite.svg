<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#fd783b"/>
  <!-- wood plank being damaged -->
  <rect x="14" y="38" width="36" height="8" rx="2" fill="#fff" opacity="0.9"/>
  <rect x="14" y="28" width="36" height="7" rx="2" fill="#fff" opacity="0.6"/>
  <!-- termite body -->
  <ellipse cx="32" cy="22" rx="5" ry="4" fill="#fff"/>
  <!-- head -->
  <ellipse cx="32" cy="14" rx="4" ry="3.5" fill="#fff"/>
  <!-- antennae -->
  <line x1="30" y1="11" x2="25" y2="7" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="34" y1="11" x2="39" y2="7" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  <!-- legs -->
  <line x1="27" y1="21" x2="19" y2="18" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="21" x2="45" y2="18" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- damage holes -->
  <circle cx="22" cy="34.5" r="2" fill="#fd783b"/>
  <circle cx="32" cy="42" r="2" fill="#fd783b"/>
  <circle cx="42" cy="34.5" r="2" fill="#fd783b"/>
</svg>
