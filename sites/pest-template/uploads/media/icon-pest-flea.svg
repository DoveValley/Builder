<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#fd783b"/>
  <!-- flea body - oval, hunched -->
  <ellipse cx="33" cy="36" rx="9" ry="7" fill="#fff"/>
  <!-- head -->
  <circle cx="24" cy="32" r="5" fill="#fff"/>
  <!-- eye -->
  <circle cx="22" cy="31" r="1.5" fill="#fd783b"/>
  <!-- antennae -->
  <line x1="22" y1="27" x2="18" y2="22" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- legs - flea has powerful hind legs -->
  <line x1="28" y1="38" x2="22" y2="46" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="34" y1="41" x2="30" y2="50" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="40" y1="40" x2="42" y2="50" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <!-- front legs -->
  <line x1="26" y1="33" x2="18" y2="30" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="26" y1="36" x2="17" y2="36" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
</svg>
