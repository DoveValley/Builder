<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#fd783b"/>
  <!-- body -->
  <ellipse cx="31" cy="38" rx="13" ry="10" fill="#fff"/>
  <!-- head -->
  <ellipse cx="20" cy="30" rx="8" ry="7" fill="#fff"/>
  <!-- ear -->
  <ellipse cx="18" cy="23" rx="4" ry="5" fill="#fff"/>
  <ellipse cx="18" cy="23" rx="2.5" ry="3.5" fill="#fd783b"/>
  <!-- eye -->
  <circle cx="16" cy="29" r="1.5" fill="#fd783b"/>
  <!-- nose -->
  <circle cx="12" cy="32" r="1.2" fill="#fd783b"/>
  <!-- whiskers -->
  <line x1="12" y1="31" x2="6" y2="29" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="33" x2="6" y2="34" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M44 40 Q52 38 52 30" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- feet -->
  <ellipse cx="24" cy="48" rx="4" ry="2" fill="#fff"/>
  <ellipse cx="36" cy="49" rx="4" ry="2" fill="#fff"/>
