<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#fd783b"/>
  <!-- bed frame -->
  <rect x="11" y="40" width="42" height="6" rx="2" fill="#fff"/>
  <rect x="11" y="34" width="42" height="8" rx="2" fill="#fff" opacity="0.7"/>
  <!-- pillow -->
  <rect x="14" y="30" width="14" height="7" rx="3" fill="#fff"/>
  <!-- bug on bed -->
  <ellipse cx="38" cy="32" rx="7" ry="5" fill="#fff"/>
  <!-- bug legs -->
  <line x1="33" y1="30" x2="28" y2="27" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="33" y1="32" x2="27" y2="32" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="33" y1="34" x2="28" y2="37" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="43" y1="30" x2="48" y2="27" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="49" y2="32" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="43" y1="34" x2="48" y2="37" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <!-- headboard -->
  <rect x="11" y="20" width="42" height="12" rx="3" fill="#fff" opacity="0.5"/>
